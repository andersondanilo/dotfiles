[colors.normal]
black = "#1c1f25"
blue = "#61afef"
cyan = "#56b6c2"
green = "#98c379"
magenta = "#c678dd"
red = "#e06c75"
white = "#dcdfe4"
yellow = "#e5c07b"

[colors.primary]
background = "#282c34"
foreground = "#dcdfe4"

# Default colors
#[colors.primary]
#background = '#3A3A3A'
#foreground = '#DCDCCC'
#
## Normal colors
#[colors.normal]
#black   = '#1E2320'
#red     = '#D78787'
#green   = '#60B48A'
#yellow  = '#DFAF8F'
#blue    = '#506070'
#magenta = '#DC8CC3'
#cyan    = '#8CD0D3'
#white   = '#DCDCCC'
#
## Bright colors
#[colors.bright]
#black   = '#709080'
#red     = '#DCA3A3'
#green   = '#C3BF9F'
#yellow  = '#F0DFAF'
#blue    = '#94BFF3'
#magenta = '#EC93D3'
#cyan    = '#93E0E3'
#white   = '#FFFFFF'

[env]
TERM = "xterm-256color"

[font]
size = 11

[font.normal]
family = "DejaVuSansMono Nerd Font Mono"
style = "Regular"

[[keyboard.bindings]]
action = "Paste"
key = "V"
mods = "Control|Shift"

[[keyboard.bindings]]
action = "Copy"
key = "C"
mods = "Control|Shift"

[[keyboard.bindings]]
action = "PasteSelection"
key = "Insert"
mods = "Shift"

[[keyboard.bindings]]
action = "ResetFontSize"
key = "Key0"
mods = "Control|Shift"

[[keyboard.bindings]]
action = "IncreaseFontSize"
key = "Equals"
mods = "Alt"

[[keyboard.bindings]]
action = "DecreaseFontSize"
key = "Minus"
mods = "Alt"

[[keyboard.bindings]]
action = "ReceiveChar"
key = "Equals"
mods = "Control"

[[keyboard.bindings]]
action = "ReceiveChar"
key = "Minus"
mods = "Control"

[mouse]
hide_when_typing = true

[window]
dynamic_padding = true
opacity = 0.90
startup_mode = "Windowed"

[window.padding]
x = 2
y = 2
